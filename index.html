<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安安的借書紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <script>
        const SUPABASE_URL = 'https://joeicjgjcmnmikytjoae.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_aRUZmCufrG1kfQS6OTvfDg_WA81QzBE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchBooks() {
            const { data, error } = await _supabase.from('books').select('*').order('created_at', { ascending: false });
            if (error) console.error(error); else renderBooks(data);
        }

        async function toggleStatus(id, field, currentVal) {
            const { error } = await _supabase.from('books').update({ [field]: !currentVal }).eq('id', id);
            if (!error) fetchBooks();
        }

        function renderBooks(books) {
            const list = document.getElementById('book-list');
            list.innerHTML = books.map(book => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3">
                    <h3 class="font-bold text-lg text-slate-800 leading-tight mb-2">${book.title}</h3>
                    <div class="flex gap-2 mb-3">
                        <button onclick="toggleStatus(${book.id}, 'is_read', ${book.is_read})" 
                            class="text-xs px-2 py-1 rounded transition-colors ${book.is_read ? 'bg-green-100 text-green-600 border border-green-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}">
                            ${book.is_read ? '✓ 已看完' : '○ 未看完'}
                        </button>
                        <button onclick="toggleStatus(${book.id}, 'is_registered', ${book.is_registered})" 
                            class="text-xs px-2 py-1 rounded transition-colors ${book.is_registered ? 'bg-blue-100 text-blue-600 border border-blue-200' : 'bg-slate-100 text-slate-400 border border-slate-200'}">
                            ${book.is_registered ? '✓ 已登記' : '○ 未登記'}
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-y-1 text-xs text-slate-500 border-t pt-2">
                        <div>✍️ ${book.author || '未知'}</div>
                        <div>🏢 ${book.publisher || '未知'}</div>
                        <div>📄 ${book.pages || 0} 頁</div>
                        <div>📅 ${new Date(book.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
            `).join('');
        }

        async function addBook() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = '儲存中...';

            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const publisher = document.getElementById('publisher').value;
            const pages = document.getElementById('pages').value;
            const is_read = document.getElementById('is_read').checked;
            const is_registered = document.getElementById('is_registered').checked;

            if (!title) { alert('請輸入書名'); btn.disabled = false; btn.innerText = '儲存紀錄'; return; }

            const { error } = await _supabase.from('books').insert([{ title, author, publisher, pages: parseInt(pages) || 0, is_read, is_registered }]);

            if (!error) {
                // 全部清空，一個都不放過！
                document.getElementById('title').value = '';
                document.getElementById('author').value = '';
                document.getElementById('publisher').value = '';
                document.getElementById('pages').value = '';
                document.getElementById('is_read').checked = false;
                document.getElementById('is_registered').checked = false;
                await fetchBooks();
            } else {
                alert('儲存失敗');
            }
            btn.disabled = false;
            btn.innerText = '儲存紀錄';
        }

        window.onload = fetchBooks;
    </script>

    <div class="max-w-md mx-auto p-4">
        <header class="py-4 text-center">
            <h1 class="text-2xl font-bold text-slate-700">📚 安安的借書紀錄</h1>
        </header>

        <div class="bg-white p-5 rounded-2xl shadow-md mb-6 border-t-4 border-blue-400">
            <div class="space-y-3">
                <input id="title" type="text" placeholder="書名 (必填)" class="w-full border p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-200 outline-none">
                <input id="author" type="text" placeholder="作者" class="w-full border p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-200 outline-none">
                <div class="flex gap-2">
                    <input id="publisher" type="text" placeholder="出版社" class="w-2/3 border p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-200 outline-none">
                    <input id="pages" type="number" placeholder="頁數" class="w-1/3 border p-3 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-200 outline-none">
                </div>
                <div class="flex gap-4 px-1">
                    <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                        <input id="is_read" type="checkbox" class="w-4 h-4"> 看完了
                    </label>
                    <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
                        <input id="is_registered" type="checkbox" class="w-4 h-4"> 已登記
                    </label>
                </div>
                <button id="save-btn" onclick="addBook()" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">儲存紀錄</button>
            </div>
        </div>

        <h2 class="text-lg font-bold text-slate-600 mb-3">最近借閱 (點擊標籤可更新狀態)</h2>
        <div id="book-list">
            <div class="text-center py-10 text-slate-400 italic">載入中...</div>
        </div>
    </div>
</body>
</html>
